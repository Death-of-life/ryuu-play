<div class="ptcg-board-deck">

  <div class="ptcg-board-zone">
    <ptcg-board-card
      (cardClick)="onDiscardClick($event.card)"
      [value]="discard"
      [owner]="isOwner"
      showCardCount="true">
    </ptcg-board-card>
    <ptcg-badge class="ptcg-board-zone-label">
      {{ 'TABLE_DISCARD_LABEL' | translate }}
    </ptcg-badge>
  </div>

  <div class="ptcg-board-zone">
    <ptcg-board-card
      (click)="onDeckClick()"
      [value]="deck"
      [owner]="isOwner"
      showCardCount="true">
    </ptcg-board-card>
    <ptcg-badge class="ptcg-board-zone-label">
      {{ 'TABLE_DECK_LABEL' | translate }}
    </ptcg-badge>
  </div>

</div>
