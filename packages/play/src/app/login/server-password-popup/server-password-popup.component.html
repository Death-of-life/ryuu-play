<h2 mat-dialog-title translate>LOGIN_SERVER_PASSWORD_TITLE</h2>

<mat-dialog-content class="ptcg-server-password-popup-content">

  <p translate>LOGIN_SERVER_PASSWORD_HINT</p>

  <form #form="ngForm" (submit)="dialogRef.close(password)">

    <!-- Server password -->
    <mat-form-field>
      <mat-label translate>LOGIN_SERVER_PASSWORD_LABEL</mat-label>
      <input type="password" matInput name="password"
        [(ngModel)]="password" [disabled]="loading" #passwordField="ngModel"
        cdkFocusInitial>
      <mat-error>
        <div *ngIf="passwordField.errors?.required" translate>VALIDATION_FIELD_REQUIRED</div>
      </mat-error>
    </mat-form-field>

  </form>

</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="cancel()">
    {{ 'BUTTON_CANCEL' | translate }}
  </button>
  <button mat-button [mat-dialog-close]="password" [disabled]="form.invalid">
    {{ 'BUTTON_OK' | translate }}
  </button>
</mat-dialog-actions>
